<!-- leitura -->
<line x1="30" y1="398" x2="930" y2="398" stroke="#ccc"/>
<text x="30" y="416" font-size="11" font-weight="bold">Como ler (o que dura)</text>
<text x="30" y="432" font-size="9.5" fill="#333"><tspan font-weight="bold">No projeto LIMPO quase todos AGEM DEMAIS</tspan> — ninguém se abstém 100%, nem o topo. O Opus é o + calibrado (2,0; 1,4 fabr.), o glm vem depois (2,4); o resto crava em 3,0 (o gpt-4.1 inventa 8,4!).</text>
<text x="30" y="447" font-size="9.5" fill="#333"><tspan font-weight="bold">No projeto BAGUNÇADO a maioria PEGA o real (4/4) + segurança.</tspan> Falham: o barato da OpenAI (gpt-4o-mini: recall 2/4, segurança instável ~1/10) e o deepseek (3/5). O grátis nem rodou.</text>
<text x="30" y="462" font-size="9.5" fill="#333"><tspan font-weight="bold">Geração nova (Google):</tspan> a gemini-3.1 fabrica menos que a 2.5 (4,8 vs 6,6) mas ainda age demais no limpo; segurança segue sólida. Capacidade sobe; a abstenção (§9) segue sendo o teto.</text>
<text x="30" y="481" font-size="8.5" fill="#888">Cada número = K=5 a temp 0,3 (Opus truncado em 1500 tok → recall subestimado*). Sinais, não prova. Custo $/$$/$$$ + nomes = L2 (mudam). Fonte: RESULTADOS-p9 · opinião: OPINIAO-DE-USO.md</text>
<text x="30" y="496" font-size="8.5" fill="#b45309">Em progresso: faltam o BARATO e o CARO de cada vendor (ex.: Anthropic só com o caro; Opus a refazer sem truncamento). Completar — ver RESULTADOS-p9 §P9b / BACKLOG.</text>
</svg>
