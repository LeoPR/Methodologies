<text x="30" y="90" font-size="10.5" font-weight="bold" fill="#444">vendor / modelo · tier · custo</text>
<text x="340" y="90" font-size="11" font-weight="bold" fill="#15803d">BAGUNÇADO</text>
<text x="420" y="90" font-size="11" font-weight="bold" fill="#b45309">LIMPO <tspan font-weight="normal" font-size="9.5" fill="#777">(inventou menos = melhor)</tspan></text>
<line x1="30" y1="96" x2="930" y2="96" stroke="#ccc"/>

