<svg xmlns="http://www.w3.org/2000/svg" width="960" height="516" font-family="sans-serif">
<rect width="960" height="516" fill="white"/>
<text x="30" y="26" font-size="16" font-weight="bold">Strata por IA — qual modelo usar (jun/2026)</text>
<text x="30" y="45" font-size="11" fill="#666">Por vendor, do melhor ao mínimo que serve. Todos os usáveis pegam o projeto bagunçado — a diferença está no limpo.</text>
<line x1="30" y1="58" x2="930" y2="58" stroke="#ccc"/>

<!-- cabecalho que abraca os dois tipos de projeto -->
