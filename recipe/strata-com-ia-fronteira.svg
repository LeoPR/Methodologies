<!-- legenda -->
<text x="32" y="372" font-size="11" font-weight="bold">Como ler</text>
<rect x="32" y="380" width="16" height="8" rx="2" fill="#86efac"/><circle cx="40" cy="384" r="3.5" fill="#15803d"/>
<text x="54" y="387" font-size="9.5" fill="#333"><tspan font-weight="bold">Confiável</tspan> — a faixa toda fica acima do neutro (ajuda até no pior caso). Hoje: só o Opus.</text>
<rect x="32" y="394" width="16" height="8" rx="2" fill="#fcd34d"/><circle cx="40" cy="398" r="3.5" fill="#b45309"/>
<text x="54" y="401" font-size="9.5" fill="#333"><tspan font-weight="bold">Aposta</tspan> — a faixa cruza o neutro: às vezes ajuda, às vezes atrapalha. Use como rascunho.</text>
<circle cx="40" cy="412" r="3.5" fill="#9ca3af"/>
<text x="54" y="415" font-size="9.5" fill="#333"><tspan font-weight="bold">Neutro estável</tspan> — não ajuda nem atrapalha, de forma consistente.</text>
<text x="595" y="387" font-size="8.5" fill="#888">Faixa = variação entre projetos/execuções. Sinais, não prova (N pequeno).</text>
<text x="595" y="400" font-size="8.5" fill="#888">Custo $/$$/$$$ + NOMES de modelo = L2 (mudam rápido). Snapshot jun/2026; o que dura é o padrão por TIER.</text>
<text x="595" y="413" font-size="8.5" fill="#888">Modelos novos (jun): RESULTADOS-p9 · Opinião completa: OPINIAO-DE-USO.md</text>
