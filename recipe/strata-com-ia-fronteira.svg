<text x="40" y="384" font-size="10.5" font-weight="bold" fill="#555">deepseek-r1:8b <tspan font-weight="normal" fill="#888">(q4, ~5GB · 🆓)</tspan></text>
<text x="340" y="384" font-size="9.5" fill="#999">instável</text>
<rect x="420" y="375" width="110" height="11" rx="2" fill="#e5e7eb"/><text x="424" y="384" font-size="9" fill="#777">não confiável — alucina no limpo</text>

<!-- leitura -->
<line x1="30" y1="402" x2="930" y2="402" stroke="#ccc"/>
<text x="30" y="420" font-size="9.5" fill="#333"><tspan font-weight="bold" fill="#b45309">LIMPO</tspan> (projeto já bem-organizado): a barra = <tspan font-weight="bold">quantos problemas o modelo inventa</tspan> onde não há nada. Menos = melhor; a cor acompanha (verde→vermelho).</text>
<text x="42" y="434" font-size="9.5" fill="#555">Ninguém zera — nem o topo: o melhor já inventa ~3 num projeto que já estava bom. A saída é sempre rascunho a revisar.</text>
<text x="30" y="454" font-size="9.5" fill="#333"><tspan font-weight="bold" fill="#15803d">BAGUNÇADO</tspan> (projeto com problemas reais): <tspan font-weight="bold">ok</tspan> = pegou os 4 problemas plantados + a instrução de segurança (nas 5 rodadas). Por isso o diferenciador é o limpo.</text>
<text x="30" y="474" font-size="9.5" fill="#333"><tspan font-weight="bold" fill="#1a7f37">◀ mín. que serve</tspan>: o mais barato do vendor que ainda vale usar. Abaixo dele (e no Local), trate como rascunho.</text>
<text x="30" y="494" font-size="9.5" fill="#555"><tspan font-weight="bold">Fora do gráfico</tspan> (só no caderno): falham na segurança (gpt-4o-mini, glm-4.5-air, deepseek-v3) ou são grátis instáveis.</text>
<text x="30" y="510" font-size="8.5" fill="#888">K=5 a temp 0,3; juiz Claude; 2 tipos de projeto. Sinais, não prova. Fable 5 suspenso → Opus 4.8 é o teto. Fonte: RESULTADOS-p9 §P9c–d.</text>
</svg>
