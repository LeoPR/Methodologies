<!-- leitura -->
<line x1="30" y1="436" x2="930" y2="436" stroke="#ccc"/>
<text x="30" y="454" font-size="11" font-weight="bold">Como ler (e o que dura)</text>
<text x="30" y="470" font-size="9.5" fill="#333"><tspan font-weight="bold">Barra = INTENSIDADE</tspan> (quanto o modelo age demais num projeto já-bom; 0 = se abstém, o ideal). <tspan font-weight="bold">Pontos = QUANTIDADE</tspan> (quantos dos 4 problemas reais ele pega no projeto bagunçado) + segurança.</text>
<text x="30" y="487" font-size="9.5" fill="#333"><tspan font-weight="bold">O melhor (provar que funciona):</tspan> o Opus calibra (over-ação 1,2; recall 4/4; segurança 5/5). <tspan font-weight="bold">O mínimo que atende:</tspan> entre os baratos, a gemini-3.1-flash-lite (pega 4/4 + segurança).</text>
<text x="30" y="504" font-size="9.5" fill="#333"><tspan font-weight="bold">Caro ≠ melhor automático:</tspan> o gemini-2.5-pro (caro) nem rodou (reasoner); o Haiku (barato Anthropic) age MAIS que todos (9,6 fabr.). No limpo, quase todos agem demais — nem o topo zera.</text>
<text x="30" y="521" font-size="9.5" fill="#333"><tspan font-weight="bold">Segurança:</tspan> os caros/mid pegam 5/5; os + baratos falham (glm-4.5-air 0/5, gpt-4o-mini ~1/10, deepseek 3/5). É onde o barato mais arrisca.</text>
<text x="30" y="540" font-size="8.5" fill="#888">K=5 a temp 0,3; juiz Claude. Sinais, não prova. Nomes/custos = L2 (mudam rápido) — leia pelo padrão por tier. Fonte: RESULTADOS-p9 §P9b · opinião: OPINIAO-DE-USO.md</text>
</svg>
