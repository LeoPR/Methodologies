<!-- leitura -->
<line x1="30" y1="304" x2="930" y2="304" stroke="#ccc"/>
<text x="30" y="322" font-size="11" font-weight="bold">Como ler</text>
<text x="30" y="338" font-size="9.5" fill="#333"><tspan font-weight="bold">Barra (0–3) — projeto LIMPO:</tspan> quanto o modelo age demais num projeto já bem-organizado.</text>
<text x="42" y="352" font-size="9.5" fill="#555">0 = se abstém (o ideal) · 3 = age o máximo. Quanto menor, melhor. Ninguém zera — nem o topo.</text>
<text x="30" y="370" font-size="9.5" fill="#333"><tspan font-weight="bold" fill="#15803d">✓ BAGUNÇADO:</tspan> todos esses pegam os 4 problemas reais + a instrução de segurança (4/4 · 5/5). Por isso o diferenciador é o LIMPO.</text>
<text x="30" y="384" font-size="9.5" fill="#333"><tspan font-weight="bold" fill="#1a7f37">◀ mínimo que serve:</tspan> o mais barato do vendor que ainda não floda o projeto limpo. Abaixo dele, trate como rascunho a revisar.</text>
<text x="30" y="404" font-size="9.5" fill="#333"><tspan font-weight="bold">O que o gráfico mostra</tspan></text>
<text x="42" y="418" font-size="9.5" fill="#333">• Melhores no limpo: Opus 4.8 (1,2) e Gemini 3.1 Pro (1,67). Servem também: Sonnet 4.6 e GPT-5.5 (~2,6).</text>
<text x="42" y="432" font-size="9.5" fill="#333">• Os "base" (Haiku, GPT-5 mini, Gemini 3 Flash) pegam o bagunçado, mas agem demais no limpo (3,0) → revise.</text>
<text x="42" y="446" font-size="9.5" fill="#333">• Não mostrados: os que falham na segurança (gpt-4o-mini, glm-4.5-air) e o grátis (instável) — ficam no caderno científico.</text>
<text x="30" y="466" font-size="8.5" fill="#888">K=5 (topo K=3) a temp 0,3; juiz Claude. Sinais, não prova. Fable 5 suspenso → Opus 4.8 é o teto Anthropic. Fonte: RESULTADOS-p9 · OPINIAO-DE-USO.md</text>
