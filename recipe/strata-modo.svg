<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" font-family="sans-serif">
<rect width="940" height="500" fill="white"/>
<text x="34" y="32" font-size="19" font-weight="bold">Strata — as três camadas e como aplicá-lo</text>
<text x="34" y="54" font-size="12.5" fill="#555">L0/L1 valem independente de tecnologia (um humano aplica manualmente). Aplicá-lo por uma IA depende da capacidade do modelo.</text>

<!-- eixo durabilidade -->
<text x="22" y="300" font-size="11" fill="#888" text-anchor="middle" transform="rotate(-90 22 300)">← mais durável / mais abstrato     mais datado / mais concreto →</text>

<!-- camadas -->
<rect x="48" y="78" width="430" height="92" rx="6" fill="#dcfce7" stroke="#16a34a"/>
<text x="64" y="104" font-size="15" font-weight="bold" fill="#15803d">L0 — Núcleo atemporal</text>
<text x="64" y="124" font-size="11.5" fill="#333">método científico, epistemologia, rastreabilidade, fonte única…</text>
<text x="64" y="142" font-size="11" fill="#555" font-style="italic">"se a IA e o computador sumissem, continua verdadeiro" · décadas/séculos</text>
<rect x="380" y="86" width="90" height="22" rx="11" fill="#16a34a"/><text x="425" y="101" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">ATEMPORAL</text>

<rect x="48" y="180" width="430" height="86" rx="6" fill="#dcfce7" stroke="#22c55e"/>
<text x="64" y="205" font-size="15" font-weight="bold" fill="#15803d">L1 — Padrões consolidados</text>
<text x="64" y="225" font-size="11.5" fill="#333">Diátaxis, ADR, FAIR, IMRaD, Conventional Commits…</text>
<text x="64" y="243" font-size="11" fill="#555" font-style="italic">"uma boa forma de fazer o L0, não a única" · ~décadas</text>
<rect x="360" y="188" width="110" height="22" rx="11" fill="#22c55e"/><text x="415" y="203" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">SUBSTITUÍVEL</text>

<rect x="48" y="276" width="430" height="150" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
<text x="64" y="301" font-size="15" font-weight="bold" fill="#b45309">L2 — Adaptação à era atual</text>
<text x="64" y="321" font-size="11.5" fill="#333">como as ferramentas de hoje expressam L0/L1: agentes de IA, IDE, git…</text>
<text x="64" y="339" font-size="11" fill="#555" font-style="italic">trocável sem tocar no L0 · meses · é AQUI que mora a automação por IA</text>
<rect x="388" y="284" width="82" height="22" rx="11" fill="#f59e0b"/><text x="429" y="299" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">DATADO</text>
<!-- mini-escala de modo dentro do L2 -->
<text x="64" y="366" font-size="11" font-weight="bold" fill="#92400e">aplicar por IA — do mais fácil ao mais difícil:</text>
<rect x="64" y="376" width="124" height="40" rx="4" fill="#16a34a" opacity="0.85"/><text x="126" y="392" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="bold">manual (humano)</text><text x="126" y="407" font-size="9.5" fill="#fff" text-anchor="middle">funciona ✓</text>
<rect x="196" y="376" width="124" height="40" rx="4" fill="#eab308"/><text x="258" y="392" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="bold">IA orientada (etapas)</text><text x="258" y="407" font-size="9.5" fill="#fff" text-anchor="middle">ajuda — revise</text>
<rect x="328" y="376" width="140" height="40" rx="4" fill="#ea580c"/><text x="398" y="392" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="bold">IA automática, de 1 vez</text><text x="398" y="407" font-size="9.5" fill="#fff" text-anchor="middle">só o topo (Opus)</text>

<!-- painel direito: como aplicar -->
<line x1="510" y1="78" x2="510" y2="426" stroke="#e5e7eb"/>
<text x="536" y="98" font-size="14" font-weight="bold">Como aplicar</text>

<rect x="536" y="116" width="372" height="104" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
<text x="552" y="140" font-size="13" font-weight="bold" fill="#15803d">Manualmente (um humano)</text>
<text x="552" y="162" font-size="11.5" fill="#333">Aplica tudo, por julgamento, usando o §9 como régua.</text>
<text x="552" y="180" font-size="11.5" fill="#333">O núcleo (L0/L1) <tspan font-weight="bold">independe de tecnologia</tspan> — vale</text>
<text x="552" y="196" font-size="11.5" fill="#333">com ou sem IA, com ou sem computador.</text>
<text x="552" y="214" font-size="10.5" fill="#777" font-style="italic">é o que mais importa conferir de fato</text>

<rect x="536" y="232" width="372" height="180" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
<text x="552" y="256" font-size="13" font-weight="bold" fill="#b45309">Por uma IA (depende do modelo)</text>
<text x="552" y="280" font-size="11.5" fill="#333">• <tspan font-weight="bold">De uma vez (modelo de topo, ex. Opus):</tspan> faz a</text>
<text x="560" y="296" font-size="11.5" fill="#333">avaliação inteira — acha o real, reconhece o bom.</text>
<text x="552" y="318" font-size="11.5" fill="#333">• <tspan font-weight="bold">Outros modelos:</tspan> oriente em etapas, com checklist —</text>
<text x="560" y="334" font-size="11.5" fill="#333">ajuda, mas a saída é <tspan font-weight="bold">rascunho a revisar</tspan>.</text>
<text x="552" y="356" font-size="11.5" fill="#333">• <tspan font-weight="bold">Grátis / automático sem revisão:</tspan> ainda não.</text>
<text x="552" y="380" font-size="10.5" fill="#777" font-style="italic">O que muda entre modelos é a capacidade, não a</text>
<text x="552" y="395" font-size="10.5" fill="#777" font-style="italic">validade do método.</text>

<text x="34" y="456" font-size="11" fill="#666">O núcleo do método (L0/L1) é durável e independente de tecnologia. A camada que muda com as ferramentas (L2) é onde entra a</text>
<text x="34" y="472" font-size="11" fill="#666">automação por IA — quão bem, e quão barato, uma IA o aplica. Guia prático de uso: recipe/strata-com-ia.md.</text>
</svg>
